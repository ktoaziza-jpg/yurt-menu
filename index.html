<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yurt Restaurant - Личный кабинет и Заказ</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .user-card { background: #eef2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .user-card img { border-radius: 50%; width: 60px; height: 60px; }
        .hidden { display: none; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #218838; }
        .lang-select { width: auto; float: right; }
    </style>
</head>
<body>

<div class="container">
    <select class="lang-select" id="langSelect" onchange="changeLanguage()">
        <option value="ru">RU</option>
        <option value="en">EN</option>
    </select>
    
    <h2 id="title">Yurt Restaurant</h2>

    <!-- Блок входа через Telegram Widget -->
    <div id="login-block" style="text-align: center;">
        <p id="login-text">Для входа в личный кабинет авторизуйтесь через Telegram:</p>
        <!-- ЗАМЕНИТЕ your_bot_username НА ИМЯ ВАШЕГО БОТА БЕЗ @ -->
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="your_bot_username" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
    </div>

    <!-- Личный кабинет (скрыт до авторизации) -->
    <div id="profile-block" class="hidden">
        <div class="user-card">
            <img id="user-photo" src="" alt="Avatar" class="hidden">
            <h3 id="user-name"></h3>
            <p>ID: <span id="user-id"></span></p>
        </div>

        <form id="booking-form" onsubmit="submitBooking(event)">
            <label id="lbl-time" for="time">Время визита (ЧЧ:ММ):</label>
            <input type="text" id="time" placeholder="18:30" required pattern="^([01]?[0-9]|2[0-3]):[0-5][0-9]$">

            <label id="lbl-guests" for="guests">Количество гостей:</label>
            <input type="number" id="guests" min="1" max="20" value="2" required>

            <button type="submit" id="btn-submit">Забронировать</button>
        </form>
    </div>
</div>

<script>
    let currentUser = null;

    // Режим языков (Подготовка к English)
    const translations = {
        ru: {
            title: "Yurt Restaurant",
            loginText: "Для входа в личный кабинет авторизуйтесь через Telegram:",
            lblTime: "Время визита (ЧЧ:ММ):",
            lblGuests: "Количество гостей:",
            btnSubmit: "Забронировать",
            invalidTime: "Пожалуйста, введите корректное время в формате ЧЧ:ММ"
        },
        en: {
            title: "Yurt Restaurant",
            loginText: "Log in with Telegram to access your account:",
            lblTime: "Visit Time (HH:MM):",
            lblGuests: "Number of Guests:",
            btnSubmit: "Book Now",
            invalidTime: "Please enter a valid time in HH:MM format"
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        document.getElementById('title').innerText = translations[lang].title;
        document.getElementById('login-text').innerText = translations[lang].loginText;
        document.getElementById('lbl-time').innerText = translations[lang].lblTime;
        document.getElementById('lbl-guests').innerText = translations[lang].lblGuests;
        document.getElementById('btn-submit').innerText = translations[lang].btnSubmit;
    }

    // Реальная авторизация Telegram
    async function onTelegramAuth(user) {
        // Отправляем данные на бэкенд для проверки hash
        const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user)
        });

        const result = await response.json();
        if (result.success) {
            currentUser = user;
            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('profile-block').classList.remove('hidden');
            
            document.getElementById('user-name').innerText = `${user.first_name} ${user.last_name || ''}`;
            document.getElementById('user-id').innerText = user.id;
            if (user.photo_url) {
                const img = document.getElementById('user-photo');
                img.src = user.photo_url;
                img.classList.remove('hidden');
            }
        } else {
            alert("Ошибка авторизации! Данные подделаны или устарели.");
        }
    }

    // Отправка формы с защитой ввода
    async function submitBooking(e) {
        e.preventDefault();
        const timeInput = document.getElementById('time').value;
        const guestsInput = document.getElementById('guests').value;

        // Проверка времени
        const timeRegex = /^([01]?[0-9]|2[0-3]):[0-5][0-9]$/;
        if (!timeRegex.test(timeInput)) {
            const lang = document.getElementById('langSelect').value;
            alert(translations[lang].invalidTime);
            return;
        }

        const response = await fetch('/api/book', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: currentUser.id,
                time: timeInput,
                guests: guestsInput
            })
        });

        const res = await response.json();
        if(res.success) {
            alert("Бронирование успешно создано!");
        } else {
            alert("Ошибка при бронировании.");
        }
    }
</script>

</body>
</html>
