<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yurt Restaurant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --dark:    #1a4a56;
            --blue:    #3BABC5;
            --gold:    #FFC107;
            --gold-lt: #FFD966;
            --bg:      #f4f8fa;
            --surface: #ffffff;
            --ink:     #0d2b34;
            --muted:   #6b9aaa;
            --border:  #dcedf2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--ink);
            padding-bottom: 72px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ── */
        .header {
            background: var(--dark);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 72px;
            pointer-events: none;
            object-fit: contain;
        }
        .lang-btn {
            position: relative;
            z-index: 2;
            background: transparent;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            font-family: 'Nunito', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* ── ORNAMENT STRIP ── */
        .ornament-strip {
            background: var(--dark);
            padding: 10px 0 18px;
        }
        .orn-rule {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
            opacity: 0.5;
        }
        .orn-gems {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 0 8px;
        }
        .gem {
            width: 6px; height: 6px;
            background: var(--blue);
            transform: rotate(45deg);
            flex-shrink: 0;
        }
        .gem.g { background: var(--gold); }
        .gem.s { width: 4px; height: 4px; }
        .orn-tagline {
            text-align: center;
            font-family: 'Nunito', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3.5px;
            color: var(--muted);
        }

        /* ── CATEGORY PILLS ── */
        .cat-scroll {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            overflow-x: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            scroll-behavior: smooth;
        }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            padding: 6px 15px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.18s;
        }
        .cat-pill.active {
            background: var(--dark);
            border-color: var(--dark);
            color: var(--gold);
        }

        /* ── MENU GRID ── */
        .menu-container { padding: 12px 14px; }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .menu-item {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .item-img-wrap {
            position: relative;
            height: 110px;
            overflow: hidden;
        }
        .item-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .item-img-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--dark) 0%, #2d7a90 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .item-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--gold);
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 3px 7px;
            border-radius: 10px;
        }
        .item-badge.new {
            background: var(--blue);
            color: white;
        }
        .item-body {
            padding: 10px 11px 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .item-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.25;
            margin-bottom: 3px;
        }
        .item-desc {
            font-size: 10.5px;
            color: var(--muted);
            line-height: 1.4;
            flex: 1;
            margin-bottom: 9px;
        }
        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--dark);
            line-height: 1;
        }
        .price-sar {
            font-family: 'Nunito', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            margin-left: 2px;
        }
        .add-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--dark);
            border: none;
            color: var(--gold);
            font-size: 18px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.12s;
            line-height: 1;
        }
        .add-btn:active { transform: scale(0.9); }
        .add-btn.in-cart {
            background: var(--gold);
            color: var(--ink);
        }

        /* ── FOOTER ── */
        .footer {
            margin-top: 24px;
            padding: 24px 16px;
            background: var(--dark);
            text-align: center;
        }
        .footer-logo { height: 40px; margin-bottom: 12px; opacity: 0.85; }
        .footer p {
            font-size: 12px;
            color: var(--muted);
            margin: 4px 0;
        }
        .footer .social { margin-top: 14px; display: flex; justify-content: center; gap: 18px; }
        .footer .social i { font-size: 20px; color: var(--blue); }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px));
            z-index: 200;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            font-family: 'Nunito', sans-serif;
            font-size: 10px;
            font-weight: 600;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--dark); }
        .nav-cart-wrap { position: relative; }
        .cart-badge {
            position: absolute;
            top: -4px; right: -7px;
            background: var(--gold);
            color: var(--ink);
            font-size: 9px;
            font-weight: 800;
            width: 16px; height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* ── CHECKOUT PAGE ── */
        #checkout-page {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            z-index: 150;
            padding-bottom: 80px;
        }
        .checkout-header {
            background: var(--dark);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .checkout-back {
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            margin-right: 10px;
        }
        .checkout-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 1.5px;
            flex: 1;
            text-align: center;
        }
        .checkout-body { padding: 16px 14px; }

        /* cart items */
        .cart-item {
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 13px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .cart-item-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
        }
        .cart-item-price {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }
        .cart-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn {
            width: 28px; height: 28px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--bg);
            color: var(--dark);
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .qty-num {
            font-weight: 700;
            font-size: 14px;
            color: var(--ink);
            min-width: 18px;
            text-align: center;
        }

        /* total block */
        .total-block {
            background: var(--dark);
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0;
        }
        .total-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--muted);
        }
        .total-sum {
            font-family: 'Cormorant Garamond', serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--gold);
        }

        /* divider */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 14px;
        }
        .div-line { flex: 1; height: 1px; background: var(--border); }
        .div-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--muted);
        }

        /* form fields */
        .field-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .field-wrap { margin-bottom: 12px; }
        .input-field {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s;
        }
        .input-field:focus { border-color: var(--blue); }
        .input-field::placeholder { color: #aac5ce; }
        .address-row { display: flex; gap: 8px; }
        .geo-btn {
            background: var(--blue);
            border: none;
            border-radius: 12px;
            padding: 0 16px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* confirm btn */
        .confirm-btn {
            width: 100%;
            background: var(--gold);
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            transition: opacity 0.15s;
        }
        .confirm-btn:active { opacity: 0.85; }
        .pay-note {
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

</div>

</div>

    let cart = {};
    let activeCat = 'salads';

    function toggleLang() {
        currentLang = currentLang === 'ru' ? 'en' : 'ru';
        document.getElementById('btn-lang').innerText = currentLang === 'ru' ? 'EN' : 'RU';
        renderApp();
    }

    function filterCat(cat) {
        activeCat = cat;
        renderApp();
        document.querySelector('.menu-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function getLocation() {
        if (!navigator.geolocation) { tg.showAlert("Геолокация не поддерживается."); return; }
        tg.HapticFeedback.impactOccurred('medium');
        const placeholder = currentLang === 'ru' ? "Определяем локацию..." : "Locating...";
        document.getElementById('cust-address').placeholder = placeholder;
        navigator.geolocation.getCurrentPosition(
            pos => {
                document.getElementById('cust-address').value = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
            },
            () => {
                tg.showAlert(currentLang === 'ru' ? "Не удалось получить GPS. Введите адрес." : "GPS failed. Please type your address.");
                document.getElementById('cust-address').placeholder = "Riyadh, Olaya St...";
            },
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
    }

    function renderApp() {
        // Categories
        let navHtml = '';
        for (let key in categories) {
            navHtml += `<button class="cat-pill ${activeCat === key ? 'active' : ''}" onclick="filterCat('${key}')">${categories[key][currentLang]}</button>`;
        }
        document.getElementById('cat-nav').innerHTML = navHtml;

        // Menu items
        const items = menuItems.filter(i => i.cat === activeCat);
        const emoji = catEmoji[activeCat] || '🍽️';
        let menuHtml = '<div class="menu-grid">';
        items.forEach(item => {
            const d = item[currentLang];
            const inCart = cart[item.id] > 0;
            let badgeHtml = '';
            if (item.badge === 'hit') badgeHtml = `<div class="item-badge">${currentLang === 'ru' ? 'ХИТ' : 'HIT'}</div>`;
            if (item.badge === 'new') badgeHtml = `<div class="item-badge new">${currentLang === 'ru' ? 'НОВИНКА' : 'NEW'}</div>`;
            menuHtml += `
                <div class="menu-item">
                    <div class="item-img-wrap">
                        <div class="item-img-placeholder">${emoji}</div>
                        ${badgeHtml}
                    </div>
                    <div class="item-body">
                        <div class="item-name">${d.n}</div>
                        ${d.d ? `<div class="item-desc">${d.d}</div>` : '<div class="item-desc"></div>'}
                        <div class="price-row">
                            <div class="price">${item.price}<span class="price-sar"> SAR</span></div>
                            <button class="add-btn ${inCart ? 'in-cart' : ''}" onclick="modifyCart('${item.id}', 1)">
                                ${inCart ? cart[item.id] : '+'}
                            </button>
                        </div>
                    </div>
                </div>`;
        });
        menuHtml += '</div>';
        document.getElementById('menu-container').innerHTML = menuHtml;

        // Labels
        const ru = currentLang === 'ru';
        document.getElementById('lbl-order').innerText     = ru ? 'Ваш заказ' : 'Your Order';
        document.getElementById('lbl-details').innerText   = ru ? 'ДЕТАЛИ ДОСТАВКИ' : 'DELIVERY DETAILS';
        document.getElementById('lbl-nav-home').innerText  = ru ? 'Меню' : 'Menu';
        document.getElementById('lbl-nav-cart').innerText  = ru ? 'Корзина' : 'Cart';
        document.getElementById('lbl-total-text').innerText = ru ? 'ИТОГО' : 'TOTAL';
        document.getElementById('lbl-name').innerText      = ru ? 'ИМЯ' : 'NAME';
        document.getElementById('lbl-phone').innerText     = ru ? 'WHATSAPP' : 'WHATSAPP';
        document.getElementById('lbl-loc').innerText       = ru ? 'АДРЕС ДОСТАВКИ' : 'DELIVERY ADDRESS';
        document.getElementById('lbl-pay-info').innerText  = ru ? 'Оплата при доставке · Mada · STC Pay · Наличные' : 'Payment upon delivery · Mada · STC Pay · Cash';
        document.getElementById('lbl-addr').innerText      = ru ? '📍 Эр-Рияд, Саудовская Аравия' : '📍 Riyadh, Saudi Arabia';
        document.getElementById('lbl-work').innerText      = ru ? '🕒 12:00 — 00:00' : '🕒 12:00 PM — 12:00 AM';
        document.getElementById('lbl-confirm').innerText   = ru ? 'ПОДТВЕРДИТЬ ЗАКАЗ' : 'CONFIRM ORDER';
        document.getElementById('cust-name').placeholder   = ru ? 'Абдулла' : 'Abdullah';

        updateCartUI();
    }

    function modifyCart(id, delta) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += delta;
        if (cart[id] <= 0) delete cart[id];
        tg.HapticFeedback.impactOccurred('light');
        updateCartUI();
        // Refresh just this button
        const buttons = document.querySelectorAll('.add-btn');
        const items = menuItems.filter(i => i.cat === activeCat);
        items.forEach((item, idx) => {
            if (buttons[idx]) {
                const inCart = cart[item.id] > 0;
                buttons[idx].classList.toggle('in-cart', inCart);
                buttons[idx].innerText = inCart ? cart[item.id] : '+';
            }
        });
        if (document.getElementById('checkout-page').style.display === 'block') renderCheckoutItems();
    }

    function updateCartUI() {
        let totalItems = 0, totalPrice = 0;
        for (let id in cart) {
            totalItems += cart[id];
            totalPrice += menuItems.find(i => i.id === id).price * cart[id];
        }
        const badge = document.getElementById('cart-badge');
        if (totalItems > 0) {
            badge.style.display = 'flex';
            badge.innerText = totalItems;
            const btnText = currentLang === 'ru' ? `ОФОРМИТЬ · ${totalPrice} SAR` : `CHECKOUT · ${totalPrice} SAR`;
            tg.MainButton.setText(btnText);
            tg.MainButton.show();
        } else {
            badge.style.display = 'none';
            tg.MainButton.hide();
            if (document.getElementById('checkout-page').style.display === 'block') showMenu();
        }
        document.getElementById('cart-total').innerText = totalPrice;
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('checkout-page').style.display = 'none';
        document.getElementById('nav-home').classList.add('active');
        document.getElementById('nav-cart').classList.remove('active');
        if (Object.keys(cart).length > 0) tg.MainButton.show();
    }

    function showCheckout() {
        if (Object.keys(cart).length === 0) return;
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('checkout-page').style.display = 'block';
        document.getElementById('nav-home').classList.remove('active');
        document.getElementById('nav-cart').classList.add('active');
        const btnText = currentLang === 'ru' ? 'ПОДТВЕРДИТЬ И ОТПРАВИТЬ' : 'CONFIRM AND SEND';
        tg.MainButton.setText(btnText);
        renderCheckoutItems();
    }

    function renderCheckoutItems() {
        let html = '';
        for (let id in cart) {
            const item = menuItems.find(i => i.id === id);
            html += `
                <div class="cart-item">
                    <div>
                        <div class="cart-item-name">${item[currentLang].n}</div>
                        <div class="cart-item-price">${item.price} SAR × ${cart[id]} = ${item.price * cart[id]} SAR</div>
                    </div>
                    <div class="cart-controls">
                        <button class="qty-btn" onclick="modifyCart('${id}', -1)">−</button>
                        <div class="qty-num">${cart[id]}</div>
                        <button class="qty-btn" onclick="modifyCart('${id}', 1)">+</button>
                    </div>
                </div>`;
        }
        document.getElementById('cart-items').innerHTML = html;
        let total = 0;
        for (let id in cart) total += menuItems.find(i => i.id === id).price * cart[id];
        document.getElementById('cart-total').innerText = total;
    }

    function submitOrder() {
        const name = document.getElementById('cust-name').value.trim();
        const phone = document.getElementById('cust-phone').value.trim();
        const address = document.getElementById('cust-address').value.trim();
        if (!name || !phone || !address) {
            const msg = currentLang === 'ru'
                ? 'Пожалуйста, заполните все поля!'
                : 'Please fill all fields!';
            tg.showAlert(msg);
            return;
        }
        let total = 0;
        for (let id in cart) total += menuItems.find(i => i.id === id).price * cart[id];
        tg.sendData(JSON.stringify({ cart, name, phone, address, total: total + ' SAR' }));
        tg.close();
    }

    tg.MainButton.onClick(() => {
        if (document.getElementById('menu-page').style.display !== 'none') {
            showCheckout();
        } else {
            submitOrder();
        }
    });

    renderApp();
</script>
