<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yurt Restaurant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #3BABC5; 
            --primary-yellow: #FFC107; 
            --text-light: #FFFFFF;
            --card-bg: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            padding-bottom: 80px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .section-title {
            text-align: center; color: var(--primary-yellow);
            text-transform: uppercase; border-bottom: 2px solid var(--primary-yellow);
            display: inline-block; padding-bottom: 5px; margin-bottom: 20px;
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item {
            background-color: var(--card-bg); border-radius: 15px; padding: 15px;
            text-align: center; display: flex; flex-direction: column;
        }
        .item-title { font-weight: bold; margin-bottom: 5px; }
        .item-desc { font-size: 12px; opacity: 0.8; margin-bottom: 10px; flex-grow: 1; }
        .item-price {
            color: var(--primary-yellow); font-weight: bold;
            border: 1px solid var(--primary-yellow); border-radius: 20px;
            padding: 5px 10px; display: inline-block; margin-bottom: 10px;
        }
        .add-btn {
            background-color: var(--primary-yellow); color: #000;
            border: none; border-radius: 10px; padding: 10px;
            font-weight: bold; width: 100%; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>YURT | يورت</h2>
    </div>

    <center><h3 class="section-title">Main Dishes</h3></center>
    <div class="menu-grid">
        <div class="menu-item">
            <div class="item-title">PILAF</div>
            <div class="item-desc">Beef, rice, carrots, onions</div>
            <div>
                <div class="item-price">30 SAR</div>
                <button class="add-btn" onclick="addToCart('Pilaf', 30)">Add</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let total = 0;

        function addToCart(item, price) {
            cart.push({item, price});
            total += price;
            tg.MainButton.setText(`CHECKOUT: ${total} SAR`);
            if (!tg.MainButton.isVisible) tg.MainButton.show();
        }

        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        });
    </script>
</body>
</html>
