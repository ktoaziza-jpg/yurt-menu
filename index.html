<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yurt Restaurant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-teal: #49b4c0;
            --brand-yellow: #f4cc12;
            --brand-white: #ffffff;
            --brand-bg: #f3f5ed;
            --brand-teal-light: #6fcacc;
            --brand-pink: #eb6390;
            --brand-blue: #1c6db5;
            
            --bg: var(--brand-bg);
            --surface: var(--brand-white);
            --ink: #1e3a47; 
            --muted: #6b8c9c;
            --border: #d4e3e8;
            --error: #eb6390;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500; 
            background: var(--bg);
            color: var(--ink);
            padding-bottom: 72px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── ШАПКА ── */
        .header {
            background: var(--brand-teal);
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
        }
        .header-left, .header-right { width: 80px; display: flex; }
        .header-right { justify-content: flex-end; }
        .header-logo {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) scale(5.0); 
            height: 40px;
            pointer-events: none;
            object-fit: contain;
        }
        
        .lang-btn {
            background: transparent;
            border: 2px solid var(--brand-yellow);
            color: var(--brand-yellow);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px; font-weight: 700; 
            letter-spacing: 1.5px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .lang-btn:active { background: var(--brand-yellow); color: var(--brand-teal); }

        /* ── ОРНАМЕНТ ── */
        .ornament-strip { background: var(--brand-teal); padding: 15px 0 25px; }
        .orn-rule {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--brand-yellow) 30%, var(--brand-yellow) 70%, transparent 100%);
            opacity: 0.6;
        }
        .orn-gems { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 20px 0 16px; }
        .gem { width: 7px; height: 7px; background: var(--brand-white); transform: rotate(45deg); flex-shrink: 0; }
        .gem.g { background: var(--brand-yellow); }
        .gem.s { width: 5px; height: 5px; opacity: 0.8; }
        .orn-tagline {
            text-align: center; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; 
            letter-spacing: 4px; color: var(--brand-white); opacity: 0.9;
        }

        /* ── ТЕГИ-ФИЛЬТРЫ ── */
        .tags-container { display: flex; gap: 6px; padding: 12px 16px 4px; overflow-x: auto; background: var(--surface); }
        .tags-container::-webkit-scrollbar { display: none; }
        .tag-pill {
            padding: 6px 12px; border-radius: 12px; background: var(--brand-bg); border: 1px solid transparent;
            color: var(--ink); font-size: 11px; font-weight: 700; white-space: nowrap; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .tag-pill.active { background: var(--brand-yellow); color: var(--brand-blue); border-color: var(--brand-yellow); }

        /* ── CATEGORY PILLS ── */
        .cat-scroll { display: flex; gap: 8px; padding: 10px 16px 14px; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); scroll-behavior: smooth; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-pill {
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--border); background: transparent;
            color: var(--muted); font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0; cursor: pointer; transition: all 0.2s;
        }
        .cat-pill.active { background: var(--brand-blue); border-color: var(--brand-blue); color: var(--brand-white); }

        /* ── MENU GRID ── */
        .menu-container { padding: 16px 14px; min-height: 300px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .menu-item { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 12px rgba(73, 180, 192, 0.05); }
        .item-img-wrap { position: relative; height: 120px; overflow: hidden; background: #eee; }
        .item-img { width: 100%; height: 100%; object-fit: cover; display: block; position: relative; z-index: 2; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .item-img.loaded { opacity: 1; }
        .item-img-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--brand-teal) 0%, var(--brand-teal-light) 100%); display: flex; align-items: center; justify-content: center; font-size: 42px; z-index: 1; }
        .item-badge { position: absolute; top: 10px; left: 10px; background: var(--brand-yellow); color: var(--ink); font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 4px 8px; border-radius: 12px; text-transform: uppercase; z-index: 3; }
        .item-badge.new { background: var(--brand-pink); color: var(--brand-white); }
        .item-body { padding: 12px; display: flex; flex-direction: column; flex: 1; }
        .item-name { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; color: var(--brand-blue); line-height: 1.3; margin-bottom: 4px; }
        .item-desc { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); line-height: 1.4; flex: 1; margin-bottom: 12px; }
        .price-row { display: flex; align-items: center; justify-content: space-between; }
        .price { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; color: var(--ink); line-height: 1; }
        .price-sar { font-size: 11px; font-weight: 600; color: var(--brand-teal); margin-left: 3px; }
        .add-btn { width: 32px; height: 32px; border-radius: 10px; background: var(--brand-teal-light); border: none; color: var(--brand-white); font-size: 18px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; line-height: 1; z-index: 3; }
        .add-btn:active { transform: scale(0.9); }
        .add-btn.in-cart { background: var(--brand-yellow); color: var(--brand-blue); }

        /* ── ТАБЫ: ДОСТАВКА / САМОВЫВОЗ ── */
        .fulfillment-tabs { display: flex; background: var(--border); padding: 4px; border-radius: 14px; margin-bottom: 20px; }
        .fulf-btn { flex: 1; padding: 12px; border: none; background: transparent; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .fulf-btn.active { background: var(--surface); color: var(--brand-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* ── ТАБЫ: ВРЕМЯ САМОВЫВОЗА ── */
        .time-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .time-tab-btn { flex: 1; padding: 10px; border: 2px solid var(--border); background: var(--surface); font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .time-tab-btn.active { border-color: var(--brand-teal); color: var(--brand-teal); background: rgba(73, 180, 192, 0.05); }

        /* ── FOOTER ── */
        .footer { margin-top: 24px; padding: 40px 16px 30px; background: var(--brand-teal); text-align: center; color: var(--brand-white); overflow: hidden; }
        .footer-logo { height: 30px; margin-bottom: 35px; object-fit: contain; transform: scale(5.0); display: block; margin-left: auto; margin-right: auto; }
        .footer p { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; color: rgba(255, 255, 255, 0.9); margin: 8px 0; }
        .footer .social { margin-top: 25px; display: flex; justify-content: center; gap: 20px; }
        .footer .social a { text-decoration: none; display: inline-block; transition: transform 0.2s; }
        .footer .social a:active { transform: scale(0.9); }
        .footer .social i { font-size: 24px; color: var(--brand-yellow); }

        /* ── BOTTOM NAV ── */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom, 0px)); z-index: 200; box-shadow: 0 -4px 15px rgba(0,0,0,0.03); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--muted); font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 600; transition: color 0.2s; }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--brand-blue); }
        .nav-cart-wrap { position: relative; }
        .cart-badge { position: absolute; top: -6px; right: -8px; background: var(--brand-yellow); color: var(--brand-blue); font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid var(--surface); }

        /* ── CHECKOUT PAGE ── */
        #checkout-page { display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; background: var(--bg); z-index: 150; padding-bottom: 80px; }
        .checkout-header { background: var(--brand-teal); padding: 16px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; }
        .checkout-back { background: transparent; border: none; color: var(--brand-yellow); font-size: 20px; cursor: pointer; padding: 4px; margin-right: 12px; }
        .checkout-title { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; color: var(--brand-white); letter-spacing: 1px; flex: 1; text-align: center; text-transform: uppercase; }
        .checkout-body { padding: 20px 16px; }

        .cart-item { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(73, 180, 192, 0.05); }
        .cart-item-name { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; color: var(--brand-blue); }
        .cart-item-price { font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 4px; }
        .cart-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn { width: 32px; height: 32px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); color: var(--brand-blue); font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .qty-btn:active { border-color: var(--brand-teal); }
        .qty-num { font-weight: 700; font-size: 16px; color: var(--ink); min-width: 20px; text-align: center; }

        /* ИТОГОВЫЙ БЛОК С РАЗБИВКОЙ */
        .total-block { background: var(--brand-blue); border-radius: 16px; padding: 20px; color: var(--brand-white); margin: 20px 0; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.85; }
        .total-row.main-total { margin-bottom: 0; margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.3); font-size: 16px; font-weight: 700; opacity: 1; }
        .total-row.main-total .total-sum { font-size: 26px; color: var(--brand-yellow); }

        .section-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0 16px; }
        .div-line { flex: 1; height: 2px; background: var(--border); }
        .div-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--brand-blue); }

        .field-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
        .field-wrap { margin-bottom: 16px; }
        
        .input-field { width: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 14px 16px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); outline: none; transition: border-color 0.25s ease-in-out, box-shadow 0.25s ease-in-out; }
        .input-field:focus { border-color: var(--brand-teal); }
        .input-field.input-error { border-color: var(--error); box-shadow: 0 0 8px rgba(235, 99, 144, 0.2); }
        .input-field::placeholder { color: #a9bec7; font-weight: 500; }
        
        .address-row { display: flex; gap: 10px; }
        .geo-btn { background: var(--brand-teal); border: none; border-radius: 12px; padding: 0 18px; color: var(--brand-white); font-size: 18px; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
        .geo-btn:active { opacity: 0.8; }

        .payment-methods { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
        .pay-option input { display: none; }
        .pay-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink); }
        .pay-card i { font-size: 20px; color: var(--muted); width: 24px; text-align: center; }
        .pay-option input:checked + .pay-card { border-color: var(--brand-teal); background: rgba(73, 180, 192, 0.05); }
        .pay-option input:checked + .pay-card i { color: var(--brand-teal); }

        .confirm-btn { width: 100%; background: var(--brand-yellow); border: none; border-radius: 14px; padding: 18px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 1px; color: var(--brand-blue); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: transform 0.15s; }
        .confirm-btn:active { transform: scale(0.98); }
        
        .no-items { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; font-weight: 600; grid-column: span 2; }
        
        .empty-cart-view { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-cart-view i { font-size: 56px; color: var(--border); margin-bottom: 16px; }
        .empty-cart-view p { font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div id="menu-page">
    <div class="header">
        <div class="header-left"></div>
        <img src="logo.png" alt="Yurt" class="header-logo">
        <div class="header-right">
            <button class="lang-btn" onclick="toggleLang()" id="btn-lang">EN</button>
        </div>
    </div>

    <div class="ornament-strip">
        <div class="orn-rule"></div>
        <div class="orn-gems">
            <div class="gem s"></div><div class="gem g"></div><div class="gem s"></div><div class="gem g s"></div><div class="gem"></div><div class="gem g s"></div><div class="gem s"></div><div class="gem g"></div><div class="gem s"></div><div class="gem g s"></div><div class="gem"></div><div class="gem g s"></div><div class="gem s"></div><div class="gem g"></div><div class="gem s"></div>
        </div>
        <div class="orn-tagline" id="lbl-tagline">ДОБРО ПОЖАЛОВАТЬ · يورت · WELCOME</div>
    </div>

    <div class="tags-container" id="tags-bar">
        <button class="tag-pill active" onclick="filterTag('all')" id="tag-all">✨ Все / All</button>
        <button class="tag-pill" onclick="filterTag('hit')" id="tag-hit">⭐ Хит / Hits</button>
        <button class="tag-pill" onclick="filterTag('meat')" id="tag-meat">🥩 Мясо / Meat</button>
        <button class="tag-pill" onclick="filterTag('spicy')" id="tag-spicy">🔥 Острое / Spicy</button>
    </div>

    <div class="cat-scroll" id="cat-nav"></div>
    <div class="menu-container" id="menu-container"></div>

    <div class="footer">
        <img src="logo.png" alt="Yurt" class="footer-logo">
        <p id="lbl-addr">📍 Медина, Саудовская Аравия</p>
        <p>📞 +966 50 000 0000</p>
        <p id="lbl-work">🕒 11:00 — 23:00</p>
        <div class="social">
            <a href="https://www.instagram.com/yurt.ksa/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/966500000000" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</div>

<div id="checkout-page">
    <div class="checkout-header">
        <button class="checkout-back" onclick="showMenu()"><i class="fas fa-arrow-left"></i></button>
        <div class="checkout-title" id="lbl-order">ВАШ ЗАКАЗ</div>
        <div style="width:34px;"></div>
    </div>
    <div class="checkout-body">
        
        <!-- СВИТЧЕР ТИПА ПОЛУЧЕНИЯ -->
        <div class="fulfillment-tabs">
            <button class="fulf-btn active" id="tab-delivery" onclick="setFulfillment('delivery')">🛵 ДОСТАВКА</button>
            <button class="fulf-btn" id="tab-pickup" onclick="setFulfillment('pickup')">🛍️ САМОВЫВОЗ</button>
        </div>

        <div id="cart-items"></div>

        <div class="total-block">
            <div class="total-row">
                <span id="lbl-break-items">Блюда:</span>
                <span><span id="cart-subtotal">0</span> SAR</span>
            </div>
            <div class="total-row" id="row-delivery-price">
                <span id="lbl-break-del">Доставка:</span>
                <span><span id="cart-delivery-cost">15</span> SAR</span>
            </div>
            <div class="total-row main-total">
                <span id="lbl-total-text">ИТОГО:</span>
                <span class="total-sum"><span id="cart-total">0</span> SAR</span>
            </div>
        </div>

        <div class="section-divider">
            <div class="div-line"></div>
            <div class="div-label" id="lbl-details">ДЕТАЛИ ЗАКАЗА</div>
            <div class="div-line"></div>
        </div>

        <div class="field-wrap">
            <div class="field-label" id="lbl-name">ИМЯ</div>
            <input type="text" id="cust-name" class="input-field" placeholder="Abdullah" oninput="this.classList.remove('input-error')">
        </div>
        <div class="field-wrap">
            <div class="field-label" id="lbl-phone">WHATSAPP</div>
            <input type="tel" id="cust-phone" class="input-field" placeholder="+966 5X XXX XXXX" oninput="this.classList.remove('input-error')">
        </div>
        
        <!-- ДИНАМИЧЕСКИЙ БЛОК АДРЕСА (ДЛЯ ДОСТАВКИ) -->
        <div class="field-wrap" id="wrap-address">
            <div class="field-label" id="lbl-loc">АДРЕС ДОСТАВКИ</div>
            <div class="address-row">
                <input type="text" id="cust-address" class="input-field" placeholder="Medina..." oninput="this.classList.remove('input-error')">
                <button class="geo-btn" onclick="getLocation()" id="btn-geo"><i class="fas fa-map-marker-alt"></i></button>
            </div>
        </div>

        <!-- ДИНАМИЧЕСКИЙ БЛОК ВРЕМЕНИ (ДЛЯ САМОВЫВОЗА) -->
        <div id="wrap-pickup-time" style="display: none; margin-bottom: 16px;">
            <div class="field-label" id="lbl-time-title">ВРЕМЯ ПРИГОТОВЛЕНИЯ</div>
            <div class="time-tabs">
                <button class="time-tab-btn active" id="time-asap" onclick="setPickupTimeType('asap')">Как можно скорее</button>
                <button class="time-tab-btn" id="time-scheduled" onclick="setPickupTimeType('scheduled')">Ко времени</button>
            </div>
            <div id="wrap-custom-time" style="display: none;">
                <input type="time" id="cust-pickup-time" class="input-field" oninput="this.classList.remove('input-error')">
            </div>
        </div>
        
        <div class="field-wrap">
            <div class="field-label" id="lbl-comment">КОММЕНТАРИЙ К ЗАКАЗУ</div>
            <input type="text" id="cust-comment" class="input-field" placeholder="...">
        </div>

        <div class="section-divider" style="margin-top: 30px;">
            <div class="div-line"></div>
            <div class="div-label" id="lbl-payment-title">СПОСОБ ОПЛАТЫ</div>
            <div class="div-line"></div>
        </div>

        <!-- УБРАНА ОНЛАЙН-ОПЛАТА. ОСТАЛОСЬ ТОЛЬКО ДВА СПОСОБА (С ДИНАМИЧЕСКИМ ТЕКСТОМ) -->
        <div class="payment-methods">
            <label class="pay-option">
                <input type="radio" name="payment" value="cash" checked>
                <div class="pay-card">
                    <i class="fas fa-money-bill-wave"></i>
                    <span id="lbl-pay-cash">Наличными курьеру</span>
                </div>
            </label>
            <label class="pay-option">
                <input type="radio" name="payment" value="terminal">
                <div class="pay-card">
                    <i class="fas fa-credit-card"></i>
                    <span id="lbl-pay-term">Картой курьеру (Терминал)</span>
                </div>
            </label>
        </div>

        <button class="confirm-btn" id="btn-submit-order-page" onclick="submitOrder()">
            <i class="fas fa-check"></i>
            <span id="lbl-confirm">ПОДТВЕРДИТЬ ЗАКАЗ</span>
        </button>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" onclick="showMenu()" id="nav-home">
        <i class="fas fa-utensils"></i>
        <span id="lbl-nav-home">Меню</span>
    </button>
    <button class="nav-item" onclick="showCheckout()" id="nav-cart">
        <div class="nav-cart-wrap">

    function getLocation() {
        if (!navigator.geolocation) { tg.showAlert("Геолокация не поддерживается."); return; }
        tg.HapticFeedback.impactOccurred('medium');
        const placeholder = currentLang === 'ru' ? "Определяем локацию..." : "Locating...";
        document.getElementById('cust-address').placeholder = placeholder;
        document.getElementById('cust-address').classList.remove('input-error');
        navigator.geolocation.getCurrentPosition(
            pos => {
                document.getElementById('cust-address').value = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
            },
            () => {
                tg.showAlert(currentLang === 'ru' ? "Не удалось получить GPS. Введите адрес." : "GPS failed. Please type your address.");
                document.getElementById('cust-address').placeholder = "Medina...";
            },
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
    }

                        </div>
                        <div class="item-body">
                            <div class="item-name">${d.n}</div>
                            ${d.d ? `<div class="item-desc">${d.d}</div>` : '<div class="item-desc"></div>'}
                            <div class="price-row">
                                <div class="price">${item.price}<span class="price-sar"> SAR</span></div>
                                <button class="add-btn ${inCart ? 'in-cart' : ''}" onclick="modifyCart('${item.id}', 1)">
                                    ${inCart ? cart[item.id] : '+'}
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }
        menuHtml += '</div>';
        document.getElementById('menu-container').innerHTML = menuHtml;

        const ru = currentLang === 'ru';
        document.getElementById('lbl-order').innerText     = ru ? 'ВАШ ЗАКАЗ' : 'YOUR ORDER';
        document.getElementById('lbl-details').innerText   = ru ? 'ДЕТАЛИ ЗАКАЗА' : 'ORDER DETAILS';
        document.getElementById('lbl-nav-home').innerText  = ru ? 'Меню' : 'Menu';
        document.getElementById('lbl-nav-cart').innerText  = ru ? 'Корзина' : 'Cart';
        
        document.getElementById('tab-delivery').innerText  = ru ? '🛵 ДОСТАВКА' : '🛵 DELIVERY';
        document.getElementById('tab-pickup').innerText    = ru ? '🛍️ САМОВЫВОЗ' : '🛍️ PICKUP';
        
        document.getElementById('lbl-break-items').innerText = ru ? 'Блюда:' : 'Items:';
        document.getElementById('lbl-break-del').innerText   = ru ? 'Доставка:' : 'Delivery:';
        document.getElementById('lbl-total-text').innerText = ru ? 'ИТОГО:' : 'TOTAL:';
        
        document.getElementById('lbl-name').innerText      = ru ? 'ИМЯ' : 'NAME';
        document.getElementById('lbl-phone').innerText     = ru ? 'WHATSAPP' : 'WHATSAPP';
        document.getElementById('lbl-loc').innerText       = ru ? 'АДРЕС ДОСТАВКИ' : 'DELIVERY ADDRESS';
        document.getElementById('lbl-time-title').innerText = ru ? 'ВРЕМЯ ПРИГОТОВЛЕНИЯ' : 'PREPARATION TIME';
        
        document.getElementById('time-asap').innerText     = ru ? 'Как можно скорее' : 'As soon as possible';
        document.getElementById('time-scheduled').innerText = ru ? 'Ко времени' : 'Schedule time';
        
        document.getElementById('lbl-comment').innerText   = ru ? 'КОММЕНТАРИЙ К ЗАКАЗУ' : 'ORDER COMMENT';
        document.getElementById('lbl-addr').innerText      = ru ? '📍 Медина, Саудовская Аравия' : '📍 Medina, Saudi Arabia';
        document.getElementById('lbl-work').innerText      = ru ? '🕒 11:00 — 23:00' : '🕒 11:00 AM — 23:00 PM';
        document.getElementById('lbl-confirm').innerText   = ru ? 'ПОДТВЕРДИТЬ ЗАКАЗ' : 'CONFIRM ORDER';
        document.getElementById('lbl-tagline').innerText   = ru ? 'ДОБРО ПОЖАЛОВЬ · يورت · WELCOME' : 'WELCOME · يورت · ДОБРО ПОЖАЛОВЬ';
        document.getElementById('cust-name').placeholder   = ru ? 'Абдулла' : 'Abdullah';
        document.getElementById('cust-comment').placeholder = ru ? 'Например: без лука, поострее...' : 'E.g., no onions, extra spicy...';
        
        document.getElementById('lbl-payment-title').innerText = ru ? 'СПОСОБ ОПЛАТЫ' : 'PAYMENT METHOD';
        
        // Рендерим стартовые тексты оплаты при первом открытии
        if (fulfillmentType === 'pickup') {
            document.getElementById('lbl-pay-cash').innerText = ru ? 'Наличными на кассе' : 'Cash on Counter';
            document.getElementById('lbl-pay-term').innerText = ru ? 'Картой на кассе (Терминал)' : 'Card on Counter (Terminal)';
        } else {
            document.getElementById('lbl-pay-cash').innerText = ru ? 'Наличными курьеру' : 'Cash on Delivery';
            document.getElementById('lbl-pay-term').innerText = ru ? 'Картой курьеру (Терминал)' : 'Card on Delivery (Terminal)';
        }

        updateCartUI();
    }

    function modifyCart(id, delta) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += delta;
        if (cart[id] <= 0) delete cart[id];
        tg.HapticFeedback.impactOccurred('light');
        updateCartUI();
        
        const buttons = document.querySelectorAll('.add-btn');
        let items = menuItems.filter(i => i.cat === activeCat);
        if (activeTag !== 'all') {
            items = items.filter(i => i.tags && i.tags.includes(activeTag));
        }
        items.forEach((item, idx) => {
            if (buttons[idx]) {
                const inCart = cart[item.id] > 0;
                buttons[idx].classList.toggle('in-cart', inCart);
                buttons[idx].innerText = inCart ? cart[item.id] : '+';
            }
        });
        if (document.getElementById('checkout-page').style.display === 'block') renderCheckoutItems();
    }

    function updateCartUI() {
        let totalItems = 0, subtotalPrice = 0;
        for (let id in cart) {
            totalItems += cart[id];
            subtotalPrice += menuItems.find(i => i.id === id).price * cart[id];
        }
        
        let deliveryCost = fulfillmentType === 'delivery' ? 15 : 0;
        let finalTotal = subtotalPrice > 0 ? (subtotalPrice + deliveryCost) : 0;

        const badge = document.getElementById('cart-badge');
        if (totalItems > 0) {
            badge.style.display = 'flex';
            badge.innerText = totalItems;
        } else {
            badge.style.display = 'none';
        }

        if (totalItems > 0) {
            const btnText = currentLang === 'ru' ? `ОФОРМИТЬ · ${finalTotal} SAR` : `CHECKOUT · ${finalTotal} SAR`;
            tg.MainButton.setText(btnText);
            tg.MainButton.show();
        } else {
            if (document.getElementById('menu-page').style.display !== 'none') {
                tg.MainButton.hide();
            } else {
                tg.MainButton.hide();
            }
        }

        document.getElementById('cart-subtotal').innerText = subtotalPrice;
        document.getElementById('cart-delivery-cost').innerText = deliveryCost;
        document.getElementById('cart-total').innerText = finalTotal;
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('checkout-page').style.display = 'none';
        document.getElementById('nav-home').classList.add('active');
        document.getElementById('nav-cart').classList.remove('active');
        window.scrollTo(0, 0);
        
        let totalItems = 0;
        for (let id in cart) totalItems += cart[id];
        if (totalItems > 0) tg.MainButton.show();
        else tg.MainButton.hide();
    }

    function showCheckout() {
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('checkout-page').style.display = 'block';
        document.getElementById('nav-home').classList.remove('active');
        document.getElementById('nav-cart').classList.add('active');
        window.scrollTo(0, 0);
        
        let totalItems = 0;
        for (let id in cart) totalItems += cart[id];
        
        if (totalItems > 0) {
            const btnText = currentLang === 'ru' ? 'ПОДТВЕРДИТЬ И ОТПРАВИТЬ' : 'CONFIRM AND SEND';
            tg.MainButton.setText(btnText);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
        
        renderCheckoutItems();
    }

    function renderCheckoutItems() {
        let totalItems = 0;
        for (let id in cart) totalItems += cart[id];

        if (totalItems === 0) {
            const emRu = currentLang === 'ru';
            document.getElementById('cart-items').innerHTML = `
                <div class="empty-cart-view">
                    <i class="fas fa-shopping-basket"></i>
                    <p>${emRu ? 'Ваша корзина пуста' : 'Your cart is empty'}</p>
                    <span style="font-size:12px; opacity:0.6; display:block; margin-top:6px;">
                        ${emRu ? 'Добавьте вкусные блюда из меню' : 'Add delicious dishes from the menu'}
                    </span>
                </div>`;
            document.getElementById('btn-submit-order-page').style.display = 'none';
            return;
        }

        document.getElementById('btn-submit-order-page').style.display = 'flex';
        
        let html = '';
        for (let id in cart) {
            const item = menuItems.find(i => i.id === id);
            html += `
                <div class="cart-item">
                    <div>
                        <div class="cart-item-name">${item[currentLang].n}</div>
                        <div class="cart-item-price">${item.price} SAR × ${cart[id]} = ${item.price * cart[id]} SAR</div>
                    </div>
                    <div class="cart-controls">
                        <button class="qty-btn" onclick="modifyCart('${id}', -1)">−</button>
                        <div class="qty-num">${cart[id]}</div>
                        <button class="qty-btn" onclick="modifyCart('${id}', 1)">+</button>
                    </div>
                </div>`;
        }
        document.getElementById('cart-items').innerHTML = html;
        updateCartUI();
    }

    function submitOrder() {
        const nameInput = document.getElementById('cust-name');
        const phoneInput = document.getElementById('cust-phone');
        const addressInput = document.getElementById('cust-address');
        const timeInput = document.getElementById('cust-pickup-time');
        const comment = document.getElementById('cust-comment').value.trim();
        const payMethod = document.querySelector('input[name="payment"]:checked').value;

        const name = nameInput.value.trim();
        const phone = phoneInput.value.trim();
        const address = addressInput.value.trim();
        const customTime = timeInput.value;

        let hasError = false;
        if (!name) { nameInput.classList.add('input-error'); hasError = true; }
        if (!phone) { phoneInput.classList.add('input-error'); hasError = true; }
        
        if (fulfillmentType === 'delivery' && !address) { 
            addressInput.classList.add('input-error'); 
            hasError = true; 
        }
        
        if (fulfillmentType === 'pickup' && pickupTimeType === 'scheduled' && !customTime) {
            timeInput.classList.add('input-error');
            hasError = true;
        }

        if (hasError) {
            tg.HapticFeedback.notificationOccurred('error');
            const msg = currentLang === 'ru' ? 'Заполните подсвеченные поля!' : 'Please fill the highlighted fields!';
            tg.showAlert(msg);
            return;
        }

        let subtotal = 0;
        for (let id in cart) subtotal += menuItems.find(i => i.id === id).price * cart[id];
        let deliveryCost = fulfillmentType === 'delivery' ? 15 : 0;
        let finalTotal = subtotal + deliveryCost;

        let finalTimeStr = 'Как можно скорее';
        if (fulfillmentType === 'pickup' && pickupTimeType === 'scheduled') {
            finalTimeStr = customTime;
        }

        tg.sendData(JSON.stringify({ 
            cart, name, phone, comment,
            fulfillment: fulfillmentType,
            address: fulfillmentType === 'delivery' ? address : 'Самовывоз из ресторана',
            time: finalTimeStr,
            subtotal: subtotal + ' SAR',
            delivery_cost: deliveryCost + ' SAR',
            total: finalTotal + ' SAR',
            payment: payMethod,
            lang: currentLang
        }));
        tg.close();
    }

    tg.MainButton.onClick(() => {
        if (document.getElementById('menu-page').style.display !== 'none') {
            showCheckout();
        } else {
            submitOrder();
        }
    });

    renderApp();
</script>
</body>
</html>
